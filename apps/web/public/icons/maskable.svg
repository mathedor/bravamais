<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="1" />
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0.85" />
    </linearGradient>
  </defs>

  <!-- canvas de fundo (cobre 100% pra maskable) -->
  <rect width="512" height="512" fill="#0A0A0A" />

  <!-- moldura interna arredondada -->
  <rect
    x="41" y="41"
    width="430" height="430"
    rx="113" ry="113"
    fill="url(#innerGrad)"
  />

  <!-- "+" gigante centralizado -->
  <g stroke="#0A0A0A" stroke-width="44" stroke-linecap="round">
    <line x1="115" y1="215.04" x2="397" y2="215.04" />
    <line x1="256" y1="74.03999999999999" x2="256" y2="356.03999999999996" />
  </g>

  <!-- "BRAVA" -->
  <text
    x="256" y="419.84"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="72" font-weight="900"
    fill="#0A0A0A"
    text-anchor="middle"
    letter-spacing="5"
  >BRAVA</text>

  <!-- chip da role (canto inferior direito) -->
  <g transform="translate(317.44, 20.48)">
    <rect
      x="0" y="0"
      width="174" height="51"
      rx="26"
      fill="#1E3A8A"
    />
    <text
      x="87" y="38"
      font-family="system-ui, sans-serif"
      font-size="28" font-weight="900"
      fill="#FFFFFF"
      text-anchor="middle"
      letter-spacing="3"
    >CLUB</text>
  </g>
</svg>