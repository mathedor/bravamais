<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BRAVA+ · Apresentação da Plataforma</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --y:#FBBF24; --y-soft:#FDE68A; --y-deep:#F59E0B;
  --ink:#0A0A0A; --panel:#121214; --panel2:#18181c;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
  --tx:#FAFAF9; --mut:#a1a1aa; --mut2:#6f6f78;
  --red:#fb7185; --amber:#fbbf24; --blue:#60a5fa; --grn:#4ade80; --org:#fb923c;
  --sans:'Inter',system-ui,sans-serif; --disp:'Archivo','Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--tx);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow:hidden}
img{max-width:100%;display:block}

/* ---------- deck / scroll ---------- */
#deck{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;scroll-behavior:smooth}
#deck::-webkit-scrollbar{width:0}
.slide{min-height:100vh;scroll-snap-align:start;position:relative;display:flex;flex-direction:column;justify-content:center;padding:64px 88px 72px;overflow:hidden}
.slide::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:44px 44px;mask-image:radial-gradient(ellipse 90% 80% at 70% 30%,#000 20%,transparent 80%)}
.glow{position:absolute;border-radius:50%;filter:blur(90px);opacity:.2;pointer-events:none}
.glow.a{width:520px;height:520px;background:var(--y);top:-160px;right:-120px}
.glow.b{width:420px;height:420px;background:#2563EB;bottom:-180px;left:-140px;opacity:.16}

/* ---------- chrome ---------- */
#bar{position:fixed;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,.06);z-index:60}
#bar>i{display:block;height:100%;width:0;background:var(--y);box-shadow:0 0 18px var(--y);transition:width .3s}
#hud{position:fixed;top:18px;right:26px;z-index:60;display:flex;align-items:center;gap:14px;font-family:var(--disp);font-size:12px;color:var(--mut)}
#hud b{color:var(--tx);font-weight:600}
#hud .k{border:1px solid var(--line2);border-radius:7px;padding:4px 8px;color:var(--mut);cursor:pointer;transition:.2s}
#hud .k:hover{color:var(--ink);background:var(--y);border-color:var(--y)}
#rail{position:fixed;left:22px;top:50%;transform:translateY(-50%);z-index:60;display:flex;flex-direction:column;gap:11px}
#rail a{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--mut2);font-size:11px;font-family:var(--disp);font-weight:600;letter-spacing:.02em}
#rail .d{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--mut2);transition:.25s;flex:none}
#rail a .t{opacity:0;transform:translateX(-6px);transition:.25s;white-space:nowrap}
#rail a:hover .t,#rail a.on .t{opacity:1;transform:none}
#rail a.on{color:var(--y)}
#rail a.on .d{background:var(--y);border-color:var(--y);box-shadow:0 0 12px var(--y);transform:scale(1.15)}

/* ---------- typography ---------- */
.kick{font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--y);display:flex;align-items:center;gap:12px}
.kick::before{content:"";width:26px;height:2px;background:var(--y);display:inline-block;border-radius:2px}
h1.big{font-family:var(--disp);font-weight:800;font-size:clamp(38px,5.2vw,74px);line-height:1.02;letter-spacing:-.02em;margin:18px 0}
h2.sec{font-family:var(--disp);font-weight:800;font-size:clamp(30px,3.4vw,48px);line-height:1.05;letter-spacing:-.02em;margin:14px 0 10px}
.lead{font-size:clamp(16px,1.5vw,20px);color:var(--mut);max-width:52ch;line-height:1.55}
.kid{font-size:17px;line-height:1.6;color:#e6e6e2;max-width:52ch}
.kid b{color:var(--y);font-weight:700}
.kid .em{background:linear-gradient(transparent 62%,rgba(251,191,36,.3) 0);padding:0 2px}

/* ---------- cover / end ---------- */
#cover,#end{text-align:center;align-items:center}
.wordmark{font-family:var(--disp);font-weight:900;font-size:clamp(34px,4vw,52px);letter-spacing:-.03em}
.wordmark b{color:var(--y)}
#cover .kick,#end .kick{justify-content:center;margin-top:26px}
#cover h1 .l,#end h2 .l{color:var(--y)}
#cover .sub{font-size:clamp(16px,1.6vw,21px);color:var(--mut);max-width:64ch;margin:8px auto 0}
.meta{position:absolute;bottom:34px;left:0;right:0;display:flex;justify-content:space-between;padding:0 88px;font-size:12px;color:var(--mut2);font-family:var(--disp)}
kbd{border:1px solid var(--line2);border-radius:5px;padding:1px 6px;font-family:var(--disp);font-size:10px}
.cta{display:inline-block;margin-top:30px;background:var(--y);color:var(--ink);font-family:var(--disp);font-weight:800;font-size:17px;padding:16px 34px;border-radius:999px;box-shadow:0 14px 44px -10px rgba(251,191,36,.55)}
.contact{margin-top:22px;font-size:13px;color:var(--mut)}
.contact b{color:var(--tx)}

/* value grid */
.vg{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:34px}
.v{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px}
.v .ic{font-size:30px;margin-bottom:12px}
.v h3{font-family:var(--disp);font-weight:700;font-size:19px;margin-bottom:8px}
.v p{font-size:13.5px;color:var(--mut);line-height:1.55}
.overline{margin-top:30px;font-size:12.5px;color:var(--mut2);font-family:var(--disp)}

/* level intro */
.levelintro{position:relative;z-index:2;max-width:1300px;margin:0 auto;width:100%}
.levelintro .no{font-family:var(--disp);font-weight:900;font-size:clamp(70px,9vw,130px);line-height:1;color:transparent;-webkit-text-stroke:2px var(--y);opacity:.9}
.levelintro .who{font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--y)}
.levelintro h2{font-family:var(--disp);font-weight:800;font-size:clamp(40px,5vw,72px);letter-spacing:-.02em;line-height:1}
.levelintro .lead{margin-top:18px}
.idx{display:flex;flex-wrap:wrap;gap:9px;margin-top:30px;max-width:900px}
.idx span{font-family:var(--disp);font-size:12px;font-weight:600;color:var(--mut);background:var(--panel);border:1px solid var(--line);padding:7px 13px;border-radius:20px}
.idx span b{color:var(--y);margin-right:6px}

/* feature slides */
.feat{position:relative;z-index:2;display:grid;grid-template-columns:minmax(320px,42%) 1fr;gap:60px;align-items:center;width:100%;max-width:1500px;margin:0 auto}
.feat .txt .num{font-family:var(--disp);font-weight:700;font-size:15px;color:var(--mut2)}
.feat .txt h2{font-family:var(--disp);font-weight:800;font-size:clamp(28px,3vw,44px);line-height:1.06;letter-spacing:-.02em;margin:14px 0 16px}
.feat .txt h2 .hl{color:var(--y)}
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}
.pill{font-family:var(--disp);font-size:12px;font-weight:600;color:var(--tx);background:var(--panel2);border:1px solid var(--line2);border-radius:20px;padding:6px 12px}
.pill.gold{background:rgba(251,191,36,.14);border-color:rgba(251,191,36,.45);color:var(--y-soft)}

/* ---------- mockups ---------- */
.mockwrap{position:relative}
.mockwrap::after{content:"";position:absolute;inset:-30px;background:radial-gradient(60% 60% at 50% 40%,rgba(251,191,36,.10),transparent 70%);z-index:-1}
.browser{background:var(--panel);border:1px solid var(--line2);border-radius:16px;overflow:hidden;box-shadow:0 40px 90px -30px rgba(0,0,0,.7)}
.browser .top{display:flex;align-items:center;gap:8px;padding:11px 14px;background:#0e0e10;border-bottom:1px solid var(--line)}
.browser .top i{width:11px;height:11px;border-radius:50%;background:#2c2c31;display:inline-block}
.browser .top .url{margin-left:12px;flex:1;background:#19191d;border:1px solid var(--line);border-radius:7px;padding:5px 12px;font-size:11px;color:var(--mut);font-family:var(--disp)}
.browser .top .url b{color:var(--y)}
.browser .body{padding:20px}
.phone{width:270px;margin:0 auto;background:var(--panel);border:8px solid #19191d;border-radius:38px;overflow:hidden;box-shadow:0 40px 90px -30px rgba(0,0,0,.8);position:relative}
.phone .notch{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:90px;height:20px;background:#19191d;border-radius:12px;z-index:5}
.phone .scr{padding:34px 14px 18px;min-height:500px}
.app{display:grid;grid-template-columns:150px 1fr;min-height:340px}
.app .side{background:#0e0e10;border-right:1px solid var(--line);padding:14px 12px}
.app .side .lg{display:flex;align-items:center;gap:7px;font-family:var(--disp);font-weight:800;font-size:14px;margin-bottom:16px}
.app .side .lg .m{width:20px;height:20px;border-radius:6px;background:var(--y)}
.app .side .nv{font-size:11.5px;color:var(--mut);padding:7px 9px;border-radius:7px;display:flex;align-items:center;gap:8px;margin-bottom:2px}
.app .side .nv.on{background:rgba(251,191,36,.13);color:var(--y);font-weight:600}
.app .side .nv .ic{width:14px;height:14px;border-radius:4px;background:currentColor;opacity:.5}
.app .main{padding:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kpi{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 13px}
.kpi .l{font-size:10.5px;color:var(--mut);letter-spacing:.04em;text-transform:uppercase;font-family:var(--disp)}
.kpi .v{font-family:var(--disp);font-weight:800;font-size:23px;margin-top:5px;letter-spacing:-.02em}
.kpi .dl{font-size:11px;margin-top:3px;color:var(--grn);font-weight:600}
.kpi.hi{background:linear-gradient(160deg,rgba(251,191,36,.16),rgba(251,191,36,.03));border-color:rgba(251,191,36,.35)}
.kpi.hi .v{color:var(--y)}
.card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px}
.card .h{font-family:var(--disp);font-size:12.5px;font-weight:600;color:var(--mut);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.card .h .tag{font-size:10px;color:var(--y);background:rgba(251,191,36,.12);border-radius:5px;padding:2px 7px;white-space:nowrap}
.bars{display:flex;align-items:flex-end;gap:9px;height:110px}
.bars .b{flex:1;background:linear-gradient(180deg,var(--y),rgba(251,191,36,.22));border-radius:5px 5px 0 0;min-height:6px}
.bars .b.g{background:linear-gradient(180deg,#2c2c33,#1c1c21)}
.line-lbls{display:flex;gap:9px;margin-top:8px}
.line-lbls span{flex:1;text-align:center;font-size:9px;color:var(--mut2);font-family:var(--disp)}
.rows{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.rows .r{display:grid;grid-template-columns:1.6fr 1fr 1fr .8fr;gap:8px;padding:10px 13px;background:var(--panel2);font-size:11.5px;align-items:center}
.rows .r.hd{background:#0e0e10;color:var(--mut);font-family:var(--disp);font-size:10px;letter-spacing:.05em;text-transform:uppercase}
.rows .r b{font-weight:600}
.st{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;display:inline-block;justify-self:start}
.st.ok{background:rgba(74,222,128,.15);color:var(--grn)}
.st.wa{background:rgba(251,191,36,.15);color:var(--amber)}
.st.no{background:rgba(251,113,133,.15);color:var(--red)}
.st.bl{background:rgba(96,165,250,.15);color:var(--blue)}
.list{display:flex;flex-direction:column;gap:7px}
.li{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:11.5px}
.li .av{width:28px;height:28px;border-radius:50%;background:linear-gradient(140deg,var(--y),var(--y-deep));color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;font-family:var(--disp);flex:none}
.li .g{flex:1;min-width:0}
.li .g b{display:block;font-weight:600}
.li .g small{color:var(--mut);font-size:10px}
.qrbox{width:132px;height:132px;margin:0 auto;border-radius:14px;background:#fff;padding:10px}
.qrbox img{width:100%;height:100%;image-rendering:pixelated}
.scanner{position:relative;border:2px solid var(--y);border-radius:16px;height:150px;background:radial-gradient(circle,rgba(251,191,36,.06),transparent);overflow:hidden}
.scanner .cn{position:absolute;width:24px;height:24px;border:3px solid var(--y)}
.scanner .cn.tl{top:10px;left:10px;border-right:0;border-bottom:0;border-radius:8px 0 0 0}
.scanner .cn.tr{top:10px;right:10px;border-left:0;border-bottom:0;border-radius:0 8px 0 0}
.scanner .cn.bl{bottom:10px;left:10px;border-right:0;border-top:0;border-radius:0 0 0 8px}
.scanner .cn.br{bottom:10px;right:10px;border-left:0;border-top:0;border-radius:0 0 8px 0}
.scanner .ln{position:absolute;left:8%;right:8%;height:2px;background:var(--y);box-shadow:0 0 14px var(--y);top:50%;animation:scan 2.4s ease-in-out infinite}
@keyframes scan{0%,100%{top:18%}50%{top:82%}}
.progressbar{height:8px;border-radius:99px;background:rgba(255,255,255,.09);overflow:hidden;margin-top:6px}
.progressbar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--y),var(--y-deep))}
.mapmk{position:relative;height:150px;border-radius:12px;background:linear-gradient(160deg,#16202e,#0e1420);overflow:hidden}
.mapmk::before{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:24px 24px}
.mapmk .pin{position:absolute;width:13px;height:13px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff}
.mapmk .route{position:absolute;height:3px;background:repeating-linear-gradient(90deg,var(--y) 0 8px,transparent 8px 14px)}
.kan{display:flex;gap:7px}
.kan>div{flex:1;background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:10px;padding:8px}
.kan h6{margin:0 0 7px;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);font-family:var(--disp)}
.kan .c{background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:7px;font-size:9.5px;margin-bottom:5px}
.kan .c small{color:var(--mut);display:block;font-size:8.5px}
.wheel{width:130px;height:130px;border-radius:50%;margin:0 auto;position:relative;border:4px solid #19191d;background:conic-gradient(var(--y) 0 60deg,#2c2c33 60deg 120deg,var(--y-deep) 120deg 180deg,#232328 180deg 240deg,var(--y) 240deg 300deg,#2c2c33 300deg 360deg)}
.wheel::after{content:"▼";position:absolute;top:-16px;left:50%;transform:translateX(-50%);color:#fff;font-size:14px}
.wheel .c{position:absolute;inset:38px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:20px}
.storybar{display:flex;gap:8px;margin-bottom:10px}
.storybar .s{width:44px;height:44px;border-radius:50%;background:linear-gradient(140deg,#3a3a40,#232328);border:2px solid var(--y);flex:none;display:flex;align-items:center;justify-content:center;font-size:16px}
.chatmsg{background:var(--panel2);border:1px solid var(--line);border-radius:12px 12px 12px 3px;padding:9px 11px;font-size:11px;max-width:85%;margin-bottom:6px}
.chatmsg.me{background:rgba(251,191,36,.14);border-color:rgba(251,191,36,.3);border-radius:12px 12px 3px 12px;margin-left:auto}
.big-save{background:linear-gradient(120deg,#1E3A8A,#2563EB);border-radius:16px;padding:16px;margin-bottom:10px}
.big-save small{color:rgba(255,255,255,.72);font-size:9.5px;text-transform:uppercase;letter-spacing:.14em;font-weight:700;font-family:var(--disp)}
.big-save b{display:block;font-family:var(--disp);font-size:27px;font-weight:900;margin-top:3px}
.mail{background:var(--panel2);border:1px solid var(--line2);border-radius:14px;overflow:hidden;max-width:420px}
.mail .mh{background:#0e0e10;padding:11px 14px;font-size:11px;color:var(--mut);border-bottom:1px solid var(--line)}
.mail .mh b{color:var(--tx)}
.mail .mb{padding:16px 14px;font-size:12px;color:#d9d9d4;line-height:1.55}
.mail .mb .btn{display:inline-block;background:var(--y);color:var(--ink);font-weight:800;font-family:var(--disp);border-radius:99px;padding:8px 18px;font-size:11px;margin-top:10px}

/* revenue slide */
.revgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:30px}
.rev{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px}
.rev .ic{font-size:22px}
.rev h4{font-family:var(--disp);font-weight:700;font-size:14.5px;margin:8px 0 4px}
.rev p{font-size:11.5px;color:var(--mut);line-height:1.5}
.rev b{color:var(--y)}

/* responsive */
@media (max-width:980px){
  .slide{padding:56px 26px 64px}
  #rail{display:none}
  .feat{grid-template-columns:1fr;gap:30px}
  .feat .mockwrap{order:-1}
  .vg{grid-template-columns:1fr}
  .revgrid{grid-template-columns:1fr 1fr}
  .meta{padding:0 26px}
  .phone{width:240px}.phone .scr{min-height:440px}
  .app{grid-template-columns:1fr}.app .side{display:none}
}
@media (max-width:560px){.revgrid{grid-template-columns:1fr}.grid4{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="bar"><i></i></div>
<div id="hud"><span><b id="cur">01</b> / <span id="tot">00</span></span><span class="k" onclick="document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()">⛶ F</span></div>
<nav id="rail"></nav>
<main id="deck"></main>

<script>
const SHOW_ADMIN = false;

const QR = "data:image/svg+xml;utf8,"+encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' shape-rendering='crispEdges'><rect width='100' height='100' fill='%23fff'/>`+
  Array.from({length:11},(_,y)=>Array.from({length:11},(_,x)=>((x*7+y*13+x*y)%3===0||(x<3&&y<3)||(x>7&&y<3)||(x<3&&y>7))?`<rect x='${9*x}' y='${9*y}' width='9' height='9' fill='%23000'/>`:'').join('')).join('')+`</svg>`);

const LEVELS = [
  {id:'intro',   label:'Início'},
  {id:'user',    label:'Assinante'},
  {id:'loja',    label:'Lojista'},
  {id:'com',     label:'Comercial'},
  {id:'entrega', label:'Entregador'},
  {id:'b2b',     label:'Empresas'},
  ...(SHOW_ADMIN?[{id:'admin', label:'Administração'}]:[]),
  {id:'fim',     label:'Fim'},
];

/* ---- mockup helpers ---- */
const appShell = (items, active, main, brand='BRAVA+') => `
<div class="browser"><div class="top"><i></i><i></i><i></i><div class="url">www.bravamais.com.br/<b>${active.toLowerCase()}</b></div></div>
<div class="app">
  <div class="side">
    <div class="lg"><span class="m"></span> ${brand}</div>
    ${items.map(n=>`<div class="nv ${n===active?'on':''}"><span class="ic"></span>${n}</div>`).join('')}
  </div>
  <div class="main">${main}</div>
</div></div>`;

const LOJA_NAV = ['Painel','Balcão','Promoções','CRM','Delivery','Financeiro','Plano'];
const ADMIN_NAV = ['Dashboard','Assinantes','Lojas','Campanhas','Financeiro','Fraude','B2B'];

const phone = (scr) => `<div class="phone"><div class="notch"></div><div class="scr">${scr}</div></div>`;

const SLIDES = [];
const S = (o)=>SLIDES.push(o);

/* ========================= CAPA ========================= */
S({type:'cover'});
S({type:'value'});
S({type:'levelmap'});

/* ========================= 01 ASSINANTE ========================= */
S({type:'intro', level:'user', no:'01', who:'A experiência de quem economiza', title:'Assinante',
  desc:'É o app amarelo no bolso do cliente. Ele assina só as categorias que usa, mostra um QR no balcão e economiza na hora — e o app mostra, em reais, quanto o clube já valeu a pena.',

/* rail */
const railEl=document.getElementById('rail');
const firstOf={};
secOrder.forEach((lvl,i)=>{if(firstOf[lvl]===undefined)firstOf[lvl]=i});
LEVELS.forEach(l=>{
  if(firstOf[l.id]===undefined)return;
  const a=document.createElement('a');
  a.href='#';a.dataset.lvl=l.id;
  a.innerHTML=`<span class="d"></span><span class="t">${l.label}</span>`;
  a.onclick=(e)=>{e.preventDefault();goTo(firstOf[l.id])};
  railEl.appendChild(a);
});

const slides=[...document.querySelectorAll('.slide')];
document.getElementById('tot').textContent=String(slides.length).padStart(2,'0');
let idx=0;
function goTo(i){idx=Math.max(0,Math.min(slides.length-1,i));slides[idx].scrollIntoView()}
function next(){goTo(idx+1)} function prev(){goTo(idx-1)}

const io=new IntersectionObserver((es)=>{
  es.forEach(e=>{if(e.isIntersecting){
    idx=+e.target.dataset.i;
    document.getElementById('cur').textContent=String(idx+1).padStart(2,'0');
    document.getElementById('bar').firstElementChild.style.width=((idx)/(slides.length-1)*100)+'%';
    const lvl=e.target.dataset.level;
    [...railEl.children].forEach(a=>a.classList.toggle('on',a.dataset.lvl===lvl));
  }});
},{threshold:.55});
slides.forEach(s=>io.observe(s));

addEventListener('keydown',e=>{
  if(['ArrowRight','ArrowDown','PageDown',' '].includes(e.key)){e.preventDefault();next()}
  if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){e.preventDefault();prev()}
  if(e.key==='Home')goTo(0);if(e.key==='End')goTo(slides.length-1);
  if(e.key.toLowerCase()==='f'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen()}
});
</script>
